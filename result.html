<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@600&family=Oswald:wght@329&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sawarabi+Mincho&family=Yuji+Mai&display=swap"

        />
        <link rel="stylesheet" href="css/ress.css" />
        <link rel="stylesheet" href="css/style.css" />

        <main>

                    <div class="silver_img"></div>
                </div>
                <div class="gold_box runk_box">
                    <img src="img/chara_icon1.png" alt="" />

                    <div class="gold_img"></div>
                </div>
                <div class="bronze_box runk_box">

                    <div class="bronze_img"></div>
                </div>
            </div>
            <div class="ranking_wrap">
                <div class="ranking_result">
                    <h2>1st</h2>
                    <img src="img/chara_icon1.png" alt="" />
                    <h3>あまね</h3>
                    <div class="data_wrap">
